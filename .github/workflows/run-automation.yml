name: Run Full Automation Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes

jobs:
  automation:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      # ---------------------------
      # CHECKOUT
      # ---------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------------
      # PYTHON SETUP
      # ---------------------------
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install python dependencies
        run: |
          pip install pandas requests stripe

      # ---------------------------
      # ENV VARS
      # ---------------------------
      - name: Export environment variables
        run: |
          echo "TTLOCK_CLIENT_ID=${{ secrets.TTLOCK_CLIENT_ID }}" >> $GITHUB_ENV
          echo "TTLOCK_CLIENT_SECRET=${{ secrets.TTLOCK_CLIENT_SECRET }}" >> $GITHUB_ENV

      # ---------------------------
      # STEP 1 — RUN TTLOCK AUTOMATION
      # ---------------------------
      - name: Run TTLock Automation
        run: python scripts/run_ttlock.py

      # ---------------------------
      # STEP 2 — PARSE TTLOCK LOGS
      # ---------------------------
      - name: Parse TTLock logs
        run: python scripts/ttlock_log_parser.py

      # ---------------------------
      # STEP 3 — RESERVATION SUMMARY
      # ---------------------------
      - name: Build combined reservation summary CSV
        run: python scripts/build_reservation_status.py

      # ---------------------------
      # STEP 4 — RUN STRIPE DEPOSITS
      # ---------------------------
      - name: Run Stripe Pre-Auth Generator
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: python scripts/run_stripe_deposits.py

      # ---------------------------
      # STEP 5 — AUTOMATIC CLEANUP (DROPZONE WIPE)
      # ---------------------------
      - name: Wipe Raw Input Data
        run: |
          echo "🧹 Cleaning up raw reservation files from dropzone..."
          rm -f automation-data/inputs/*.csv

      # ===========================================================
      # FINAL SAFE COMMIT — REGISTERS UPDATES AND DELETIONS
      # ===========================================================
      - name: Stage all changes (including deletions)
        run: |
          git add -A automation-data/ || true

      - name: Check if anything changed
        id: changes
        run: |
          if git diff --cached --quiet; then
              echo "changed=false" >> $GITHUB_OUTPUT
          else
              echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit & Push (SAFE MODE)
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

          git fetch origin main
          git reset --soft origin/main

          git commit -m "Process daily reservations and flush dropzone"
          git push origin main
