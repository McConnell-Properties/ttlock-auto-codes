name: Run Full Automation Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes

jobs:
  automation:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      # ---------------------------
      # CHECKOUT
      # ---------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------------
      # PYTHON SETUP
      # ---------------------------
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install python dependencies
        run: |
          pip install pandas requests stripe gspread oauth2client

      # ---------------------------
      # STEP 1 — RUN UNIFIED RESERVATION PIPELINE
      # ---------------------------
      # Executes stripe verification, lock code rules, link generation, and expiration overrides at once
      - name: Run Unified Reservation Status Pipeline
        env:
          TTLOCK_CLIENT_ID: ${{ secrets.TTLOCK_CLIENT_ID }}
          TTLOCK_CLIENT_SECRET: ${{ secrets.TTLOCK_CLIENT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: python scripts/run_reservation_pipeline.py

      # ---------------------------
      # STEP 2 — PUSH UNIFIED DATA TO GOOGLE SHEETS
      # ---------------------------
      - name: Export Data to Google Sheets
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/push_to_sheets.py

      # ---------------------------
      # STEP 3 — AUTOMATIC CLEANUP (DROPZONE WIPE)
      # ---------------------------
      - name: Wipe Raw Input Data
        run: |
          echo "🧹 Cleaning up raw reservation files from dropzone..."
          rm -f automation-data/inputs/*.csv

      # ===========================================================
      # FINAL SAFE COMMIT — REGISTERS UPDATES AND DELETIONS
      # ===========================================================
      - name: Stage all changes (including deletions)
        run: |
          git add -A automation-data/ || true

      # Checks if reservation_status.csv was updated with new codes or links
      - name: Check if anything changed
        id: changes
        run: |
          if git diff --cached --quiet; then
              echo "changed=false" >> $GITHUB_OUTPUT
          else
              echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit & Push (SAFE MODE)
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

          git fetch origin main
          git reset --soft origin/main

          git commit -m "Process daily reservations and flush dropzone"
          git push origin main
