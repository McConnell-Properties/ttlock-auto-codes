<!doctype html>
<meta charset="utf-8">
<title>Beds24 — Performance &amp; Inbox</title>
<!--
  Combined two-tab wrapper for embedding BOTH Beds24 pages behind one CMS nav item.
  The iframe src paths below are relative (work when this file sits next to the two
  HTML files). Change them to wherever the CMS hosts the files. Keep both pages
  behind the CMS's authentication.
-->
<style>
  html,body{margin:0;height:100%;background:#0f1419;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  .tabbar{display:flex;gap:4px;padding:8px;border-bottom:1px solid #2c3744}
  .tabbar button{padding:8px 18px;border:0;border-radius:8px;cursor:pointer;
    background:#1a2029;color:#8b98a5;font:inherit}
  .tabbar button.active{background:#4f9cf9;color:#fff}
  iframe{width:100%;height:calc(100vh - 53px);border:0;display:none}
  iframe.active{display:block}
</style>
<div class="tabbar">
  <button class="active" data-t="rep">Performance</button>
  <button data-t="inbox">Guest Inbox</button>
</div>
<iframe id="rep"   class="active" src="dashboard-embed.html"></iframe>
<iframe id="inbox"                 src="messages-dashboard.html"></iframe>
<script>
  document.querySelectorAll('.tabbar button').forEach(b => b.onclick = () => {
    document.querySelectorAll('.tabbar button').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('iframe').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById(b.dataset.t).classList.add('active');
  });
</script>
